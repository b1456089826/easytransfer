<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>易传 Windows 接收端</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      .row { margin-bottom: 10px; }
      label { display:block; font-size: 12px; margin-bottom: 4px; }
      input { width: 100%; padding: 6px; box-sizing: border-box; }
      button { padding: 8px 12px; margin-right: 8px; }
      pre { background:#111; color:#0f0; padding:10px; max-height:320px; overflow:auto; }
    </style>
  </head>
  <body>
    <h2>易传 Windows 接收端（Tauri）</h2>
    <div class="row">
      <label>监听地址（示例：0.0.0.0:18778）</label>
      <input id="listenAddr" placeholder="0.0.0.0:18778" value="0.0.0.0:18778" />
    </div>
    <div class="row">
      <label>接收文件保存路径（JSONL）</label>
      <input id="receivedPath" placeholder="C:\\...\\received.jsonl" />
    </div>
    <div class="row">
      <label>manifest.json 路径（重组时使用）</label>
      <input id="manifestPath" placeholder="C:\\...\\manifest.json" />
    </div>
    <div class="row">
      <label>输出目录</label>
      <input id="outputDir" placeholder="C:\\...\\output" />
    </div>
    <div class="row">
      <label>接收状态</label>
      <input id="statusText" placeholder="未启动" readonly />
    </div>
    <div class="row">
      <button id="startBtn">启动接收服务</button>
      <button id="stopBtn">停止接收服务</button>
      <button id="runBtn">执行重组</button>
    </div>
    <pre id="log"></pre>
    <script type="module" src="./main.js"></script>
  </body>
  </html>
