name: android-build

on:
  push:
    branches: ["main"]
    paths:
      - "apps/android-scanner/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Gradle CLI
        run: sudo apt-get update && sudo apt-get install -y gradle

      - name: Make gradlew executable
        working-directory: apps/android-scanner
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: apps/android-scanner
        run: ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytransfer-android-apk
          path: apps/android-scanner/app/build/outputs/apk/debug/*.apk
