name: cleanup-old-artifacts

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup artifacts older than 14 days
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: "14 days"
          skip-recent: 5
          skip-tags: true
